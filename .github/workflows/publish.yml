name: Publish

on:
  push:
    tags:
      - 'v*'

# contents: read     -> checkout the tagged commit
# packages: write    -> publish to GitHub Packages as the same owner
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: npm publish (GitHub Packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@theangryraven'
      - run: npm ci

      # Guard the release: tag pushes don't trigger the branch/PR pipelines.
      - run: npm run typecheck
      - run: npm run test:run

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
